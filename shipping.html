    <script>
        const savedItem = localStorage.getItem("selectedItem");
        if (savedItem) {
            const item = JSON.parse(savedItem);
            const pricecontainer=document.querySelector(".pricecontainer");
            const lateral=document.createElement("div");
            lateral.classList.add("lateral");
            lateral.innerHTML=`
    <h3>Shipping Information</h3>
<p>Shipping tooks from 2 -3 hrs as thay are fresh</p>
<p>Shipping adds 10LE to the item</p>
<p>No exchanges available</p>
<div class="hzLine2"></div>
<p>Enjoy Your Meal</p>
<A  href="./index.html"><button>Back To Shop</button>
</a>
            `
            pricecontainer.innerHTML=`
            <img class="imgCroissants2" src="${item.photo}">
            <div class="priceDiv">
                       <h2 class="nameItem2">${item.name}</h2>
             <p  class="descr2">${item.descr}</p>
             <button>Buy</button>
                    <button>Add to cart</button></div>
     
            `
               pricecontainer.scrollIntoView({ behavior: 'smooth' });
               pricecontainer.appendChild(lateral);

               lateral.style.order=3;
        }else {
            console.error("No item found in localStorage");
        }
    </script>
